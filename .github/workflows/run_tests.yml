name: Run Python Unit Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

  workflow_dispatch:

permissions:
  contents: read

env:
  POETRY_VERSION: "2.4.1"

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system libraries for SciPy builds
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install Poetry
        run: |
          pipx install poetry==${POETRY_VERSION}
          poetry --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock

      - name: Install package and test dependencies
        run: |
          poetry env use python
          echo "=== Poetry cache info ==="
          poetry config --list
          echo "=== Pip cache dir ==="
          python -m pip cache dir || true
          echo "=== Cache sizes before install ==="
          du -sh ~/.cache/pypoetry ~/.cache/pip 2>/dev/null || true
          echo "=== Timed poetry install ==="
          time poetry install --with dev --extras art --no-interaction --no-ansi -vvv
          echo "=== Installed packages ==="
          poetry run python -m pip list

      - name: Run pytest
        run: |
          poetry run python -m pytest -q tests/test_overlap_index_regression.py
