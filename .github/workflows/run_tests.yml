name: Run Python Unit Tests

on:
  pull_request:
    branches: [ main, develop ]

  workflow_dispatch:

permissions:
  contents: read

env:
  POETRY_VERSION: "2.4.1"

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            install-art: true
          - python-version: "3.10"
            install-art: true
          - python-version: "3.11"
            install-art: true
          - python-version: "3.12"
            install-art: true
          - python-version: "3.13"
            install-art: false
          - python-version: "3.14"
            install-art: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system libraries for SciPy builds
        if: ${{ matrix.install-art }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install Poetry
        run: |
          pipx install poetry==${POETRY_VERSION}
          poetry --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock

      - name: Install package and test dependencies
        if: ${{ matrix.install-art }}
        run: |
          poetry env use python
          poetry install --with dev --extras art --no-interaction --no-ansi

      - name: Install package and test dependencies without optional ART extra
        if: ${{ !matrix.install-art }}
        run: |
          poetry env use python
          poetry install --with dev --no-interaction --no-ansi

      - name: Run pytest
        run: |
          poetry run python -m pytest -q tests/test_overlap_index_regression.py
