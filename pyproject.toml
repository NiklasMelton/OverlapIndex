[project]
name = "overlapindex"
version = "0.1.0"
description = "OverlapIndex (OI), an Incremental Cluster Validity index for identifying the degree of overlap of data classes."
authors = [
    {name = "Niklas M. Melton <niklasmelton@gmail.com>"}
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "artlib (>=0.1.7,<0.2.0)",
    "numpy (>=2.4.1,<3.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
